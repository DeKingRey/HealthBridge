{% extends "layout.html" %}
{% block content %}
    <h1>Login...</h1>

    <form method="POST">
        {{ form.hidden_tag() }}

        {{ form.username }}
        {{ form.password }}

        {{ form.submit }}
    </form>

    <p>Don't have an account? <a href="{{ url_for('register') }}">Sign Up</a></p>
{% endblock %}

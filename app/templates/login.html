{% extends "layout.html" %}
{% block content %}
    <h1>Login...</h1>

    <form method="POST">
        {{ form.hidden_tag() }}

        {{ form.email }}
        {{ form.password }}

        {{ form.submit }}
    </form>

    <p>Don't have an account? <a href="{{ url_for('main.register', verified=False) }}">Sign Up</a></p>
{% endblock %}

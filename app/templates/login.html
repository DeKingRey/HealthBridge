{% extends "layout.html" %}
{% block content %}
    <h1>Login...</h1>

    <form method="POST">
        {{ form.hidden_tag() }}

        {{ form.email }}
        {{ form.password }}

        {{ form.submit }}
    </form>

    <p>Don't have an account? <a href="{{ url_for('main.register') }}">Sign Up</a></p>
    <p>Forgot your password? <a href="{{ url_for('main.reset_password', email_verified=False, user=None) }}">Reset Password</a></p>
{% endblock %}

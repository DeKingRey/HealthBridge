{% extends "layout.html" %}
{% block content %}
    <h1>Register...</h1>

    <form method="POST">
        {{ form.hidden_tag() }}
        
        {{ form.username }}
        {{ form.email }}
        {{ form.password }}
        {{ form.confirm_password }}

        {{ form.submit }}
    </form>

    <p>Already have an account? <a href="{{ url_for('main.login') }}">Log In</a></p>
{% endblock %}
